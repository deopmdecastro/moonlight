name: moonlight

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moonlight
      POSTGRES_PASSWORD: moonlight
      POSTGRES_DB: moonlight
    ports:
      # Use 5434 to avoid conflicts (and to run alongside the old stack)
      - "5434:5432"
    volumes:
      - moonlight_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moonlight -d moonlight"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  moonlight_pgdata:
